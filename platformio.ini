; PlatformIO — driver do encoder AR49-M49M-P12H (ESP32) + teste de host.
;
; Firmware (Build padrão do IDE):  pio run  -e esp32dev
; Upload + monitor serial:         pio run  -e esp32dev -t upload && pio device monitor
; Teste de host (PC, não-Arduino): pio test -e native
;   Alternativa sem PlatformIO:
;     g++ -O2 -std=c++17 -Wall -Wextra -o test_parse test/test_parse.cpp && ./test_parse

[platformio]
; `pio run` e o botão Build do IDE compilam SÓ o firmware. O env `native` é exclusivo
; de teste de host (não deve ser alvo de `run`, senão tenta compilar Arduino.h no PC).
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32doit-devkit-v1     ; DOIT DevKit V1 (ESP32-WROOM-32)
framework = arduino
monitor_speed = 115200
build_flags = -Wall -Wextra

; Ambiente de host: roda test/test_parse.cpp no PC, SEM Arduino. O teste inclui só o
; núcleo header-only AR49Frame.h (por caminho relativo). Por isso aqui:
;   - lib_ignore = AR49  -> não compila Encoder.cpp (depende de <Arduino.h>);
;   - test_build_src = no -> não compila src/main.cpp (idem).
; O caminho relativo do include continua resolvendo mesmo com a lib ignorada.
[env:native]
platform = native
test_framework = custom
test_build_src = no
lib_ignore = AR49
build_flags = -std=c++17 -Wall -Wextra
