; PlatformIO — driver do encoder AR49-M49M-P12H (ESP32) + teste de host.
;
; Firmware:   pio run   -e esp32dev
; Upload:     pio run   -e esp32dev -t upload && pio device monitor
; Teste host: pio test  -e native
;   (ou direto, sem PlatformIO:
;    g++ -O2 -std=c++17 -Wall -Wextra -o test_parse test/test_parse.cpp && ./test_parse)

[env:esp32dev]
platform = espressif32
board = esp32doit-devkit-v1     ; DOIT DevKit V1 (ESP32-WROOM-32)
framework = arduino
monitor_speed = 115200
build_flags = -Wall -Wextra

; Ambiente de host: roda test/test_parse.cpp no PC. O núcleo (AR49Frame.h) é header-only
; e sem Arduino, então nada do firmware é compilado aqui (test_build_src=no por padrão).
[env:native]
platform = native
test_framework = custom
build_flags = -std=c++17 -Wall -Wextra
